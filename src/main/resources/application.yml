spring:
  application:
    name: async-notification-system

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: notification_user
    password: notification_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마를 관리하므로 validate만 사용
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false    # 최초 실행 시 baseline 불필요 (신규 DB)

---

# 로컬 개발용 프로파일
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true

---

# 테스트용 프로파일
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://localhost:5433/notification_test_db
    username: notification_user
    password: notification_pass
